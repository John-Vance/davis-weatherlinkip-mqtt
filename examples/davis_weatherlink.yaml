      payload_not_available: "offline"
      value_template: >-
        {% if value_json.outdoor_humidity_pct is not none %}{{ value_json.outdoor_humidity_pct }}{% endif %}
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement

