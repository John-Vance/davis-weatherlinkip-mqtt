mqtt:
  sensor:
    - name: "Davis Vantage Vue Last Update"
      unique_id: davis_weatherlinkip_station_updated_at
      device: &davis_weatherlinkip_device
        identifiers:
          - "davis_weatherlinkip_station"
        name: "Davis Vantage Vue"
        manufacturer: "Davis Instruments"
        model: "Vantage Vue with WeatherLinkIP"
        configuration_url: "http://192.168.1.17/"
      state_topic: "home/weather/davis_vantage_vue/state"
      availability_topic: "home/weather/davis_vantage_vue/availability"
      payload_available: "online"
      payload_not_available: "offline"
      value_template: >-
        {% if value_json.updated_at is not none %}{{ value_json.updated_at }}{% endif %}
      json_attributes_topic: "home/weather/davis_vantage_vue/state"
      device_class: timestamp

    - name: "Davis Vantage Vue Outdoor Temperature"
      unique_id: davis_weatherlinkip_station_outdoor_temperature_f
      device: *davis_weatherlinkip_device
      state_topic: "home/weather/davis_vantage_vue/state"
      availability_topic: "home/weather/davis_vantage_vue/availability"
      payload_available: "online"
      payload_not_available: "offline"
      value_template: >-
        {% if value_json.outdoor_temperature_f is not none %}{{ value_json.outdoor_temperature_f }}{% endif %}
      unit_of_measurement: "\u00b0F"
      device_class: temperature
      state_class: measurement

    - name: "Davis Vantage Vue Outdoor Humidity"
      unique_id: davis_weatherlinkip_station_outdoor_humidity_pct
